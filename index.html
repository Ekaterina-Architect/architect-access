<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРХИТЕКТУРА ДОСТУПА 2.0 | DEEP SCAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Inter:wght@200;300;400;600;700;900&display=swap');
        
        :root {
            --accent: #fbbf24;
            --bg-deep: #020617;
            --panel-bg: rgba(15, 23, 42, 0.75);
            --border-glow: rgba(251, 191, 36, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            background: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-radius: 2.5rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input, 
        textarea, 
        select {
            width: 100%;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.25rem;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.4s ease;
            margin-top: 0.5rem;
        }

        input:focus, 
        textarea:focus, 
        select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(2, 6, 23, 0.9);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.15);
        }

        label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #94a3b8;
            margin-left: 0.5rem;
        }

        .rule-box {
            background: rgba(251, 191, 36, 0.03);
            border-left: 3px solid var(--accent);
            padding: 1.25rem;
            margin: 1rem 0;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .progress-indicator {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #d97706, #fbbf24, #d97706);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
            z-index: 100;
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .step-transition {
            animation: slideUp 0.7s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #020617;
            padding: 1.5rem;
            border-radius: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
            margin-top: 2rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(217, 119, 6, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .section-header {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-bottom: 1rem;
            display: block;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({});
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const BOT_TOKEN = '7942551419:AAGr8sj_Utwfva-05RusEC255TrguVEsOO0';
            const CHAT_ID = '829634068';

            const handleUpdate = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                if (error) setError("");
            };

            const validateStep = (fields, minLength = 10) => {
                for (let field of fields) {
                    const val = formData[field] || "";
                    if (val.trim().length < minLength) {
                        setError(`СИСТЕМА: Поле "${field.replace(/_/g, ' ')}" требует более глубокого ответа (минимум ${minLength} симв.)`);
                        return false;
                    }
                }
                setError("");
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setStep(step + 1);
                return true;
            };

            const submitProtocol = async () => {
                setLoading(true);
                const report = `
🚀 **DEEP SCAN PROTOCOL 2.0: NEW ENTRY**

👤 **SECTION 1: IDENTITY**
- Email: ${formData.Email}
- ФИО: ${formData.ФИО}
- ДР: ${formData.Дата_Рождения}
- Тел: ${formData.Телефон}
- Город/МСК: ${formData.Локация}

🏗 **SECTION 2: FOUNDATION**
- Ниша: ${formData.Ниша}
- Точка А: ${formData.Точка_А}
- Тело: ${formData.Тело}
- Сказка: ${formData.Сказка}

🔍 **SECTION 3: CRACKS**
- Истинная Цель: ${formData.Цель}
- Выгода Хаоса: ${formData.Выгода}
- Цена Простоя: ${formData.Цена_Простоя}
- Неизлечимое: ${formData.Неизлечимое}
- Барьер X10: ${formData.Барьер}
- Зона Боли: ${formData.Зона}

⚡ **SECTION 4: COMMITMENT**
- Взрыв: ${formData.Взрыв}
- Решение: ${formData.Решение}
- Смерть Системы: ${formData.Смерть}
- Результат за 500к: ${formData.Результат_500к}

🛠 **SECTION 5: RESOURCES**
- Срок: ${formData.Срок}
- Внедрение: ${formData.Внедрение}
- Реакция: ${formData.Реакция}
- Бюджет: ${formData.Бюджет}
- Время: ${formData.Время}

🎯 **SECTION 6: VERDICT**
- Почему Архитектор: ${formData.Почему_Я}
- Точка Б: ${formData.Точка_Б}
- Мессенджер: ${formData.Мессенджер}
- Ник ТГ: ${formData.Ник_ТГ}
                `;

                try {
                    await fetch(`https://api.telegram.org/bot7942551419:AAGr8sj_Utwfva-05RusEC255TrguVEsOO0/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            chat_id:'829634068', 
                            text: report, 
                            parse_mode: 'Markdown' 
                        })
                    });
                    setStep(8);
                } catch (e) {
                    setError("СБОЙ КАНАЛА СВЯЗИ. Попробуйте еще раз.");
                }
                setLoading(false);
            };

            return (
                <div className="flex-1 w-full max-w-2xl mx-auto px-4 py-12 md:py-24">
                    <div className="progress-indicator" style={{ width: `${(step / 7) * 100}%` }}></div>
                    
                    <div className="step-transition">
                        {error && <div className="error-msg">{error}</div>}

                        {step === 1 && (
                            <div className="glass-container p-8 md:p-14">
                                <span className="section-header">Раздел 1 из 7</span>
                                <h1 className="text-4xl md:text-5xl font-black italic mb-8 tracking-tighter">АРХИТЕКТУРА ДОСТУПА 2.0</h1>
                                
                                <div className="space-y-6 text-sm text-slate-300 leading-relaxed mb-10">
                                    <div className="rule-box text-white font-bold">
                                        ВНИМАНИЕ: Это не опрос. Это ваша первая сессия реинжиниринга.
                                    </div>
                                    <p><strong>1. ИНВЕСТИЦИЯ ВРЕМЕНИ (10-20 МИНУТ):</strong> Если у вас нет времени на диагностику критических ошибок — доступ будет закрыт автоматически.</p>
                                    <p><strong>2. РАДИКАЛЬНАЯ ЧЕСТНОСТЬ:</strong> Вашу анкету анализирует Триада агентов. Малейшая попытка самообмана приведет к отклонению.</p>
                                    <p><strong>3. БИОЛОГИЧЕСКИЙ ОТКЛИК:</strong> Мы ищем баги в вашей биологии. Ваше тело знает о бизнесе больше, чем разум.</p>
                                    <p><strong>4. ГЛУБИНА ТРАНСФОРМАЦИИ:</strong> Вмешательство подразумевает демонтаж от 20% до 80% ваших процессов.</p>
                                </div>

                                <div className="input-wrapper">
                                    <label>Электронная почта *</label>
                                    <input name="Email" type="email" onChange={handleUpdate} placeholder="name@example.com" />
                                </div>
                                <button className="btn-primary" onClick={() => validateStep(["Email"], 5)}>Активировать протокол</button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="glass-container p-8 md:p-14">
                                <span className="section-header">Раздел 2 из 7</span>
                                <h2 className="text-3xl font-black mb-10 uppercase italic">Знакомство</h2>
                                
                                <div className="space-y-6">
                                    <div className="input-wrapper">
                                        <label>Фамилия Имя Отчество *</label>
                                        <input name="ФИО" onChange={handleUpdate} />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Возраст (дата рождения) *</label>
                                        <input name="Дата_Рождения" onChange={handleUpdate} placeholder="ДД.ММ.ГГГГ" />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Контакт: № телефона *</label>
                                        <input name="Телефон" onChange={handleUpdate} />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Город и разница с МСК *</label>
                                        <input name="Локация" onChange={handleUpdate} placeholder="например Новосибирск, +4 мск" />
                                    </div>
                                    <button className="btn-primary" onClick={() => validateStep(["ФИО", "Телефон"], 3)}>К Диагностике Фундамента</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="glass-container p-8 md:p-14">
                                <span className="section-header">Раздел 3 из 7</span>
                                <h2 className="text-3xl font-black mb-4 uppercase italic">Блок 1: Фундамент</h2>
                                <p className="text-xs text-slate-400 italic mb-10">«Чтобы построить маршрут к свободе, нам нужно зафиксировать текущую точку старта. Здесь мы отсекаем лишние шумы».</p>
                                
                                <div className="space-y-8">
                                    <div className="input-wrapper">
                                        <label>Ниша / Вид деятельности *</label>
                                        <input name="Ниша" onChange={handleUpdate} placeholder="бизнес / эксперт" />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Точка А (Твердое) *</label>
                                        <div className="rule-box">Твой текущий финансовый оборот и чистая прибыль. Будь предельно точен.</div>
                                        <textarea name="Точка_А" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Симптом в теле *</label>
                                        <div className="rule-box">Лишний вес, ЖКТ, спина, горло, челюсть? Система анализирует тело как маркер ошибок в архитектуре бизнеса.</div>
                                        <textarea name="Тело" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>«Красивая сказка» *</label>
                                        <div className="rule-box">Какую ложь о своем успехе ты рассказываешь окружающим, чтобы не сойти за неудачника?</div>
                                        <textarea name="Сказка" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <button className="btn-primary" onClick={() => validateStep(["Точка_А", "Тело", "Сказка"], 10)}>Поиск Трещины</button>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="glass-container p-8 md:p-14">
                                <span className="section-header">Раздел 4 из 7</span>
                                <h2 className="text-3xl font-black mb-4 uppercase italic">Блок 2: Работа Хирурга</h2>
                                <p className="text-xs text-slate-400 italic mb-10">«Успешный фасад часто скрывает дефекты несущих конструкций. Находим скрытые выгоды, которые удерживают вас в застое».</p>
                                
                                <div className="space-y-8">
                                    <div className="input-wrapper">
                                        <label>Истинная цель бизнеса? *</label>
                                        <div className="rule-box">Признание, безопасность, реализация мечты или способ что-то доказать близким? Будь честен.</div>
                                        <textarea name="Цель" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Почему тебе ВЫГОДНО находиться в застое? *</label>
                                        <div className="rule-box">Что ты боишься потерять, если всё станет легко?</div>
                                        <textarea name="Выгода" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Цена месяца текущего состояния *</label>
                                        <input name="Цена_Простоя" onChange={handleUpdate} placeholder="В деньгах, здоровье, отношениях" />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>«Неизлечимая» проблема *</label>
                                        <textarea name="Неизлечимое" rows="2" onChange={handleUpdate} placeholder="То, что боитесь озвучить даже себе"></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Барьер Х10 *</label>
                                        <textarea name="Барьер" rows="2" onChange={handleUpdate} placeholder="Одно главное препятствие"></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Область максимального сопротивления *</label>
                                        <select name="Зона" onChange={handleUpdate}>
                                            <option value="">Выберите область...</option>
                                            <option value="Деньги">Деньги</option>
                                            <option value="Команда">Команда</option>
                                            <option value="Стратегия">Стратегия</option>
                                        </select>
                                    </div>
                                    <button className="btn-primary" onClick={() => validateStep(["Цель", "Выгода", "Барьер"], 10)}>К Тесту Готовности</button>
                                </div>
                            </div>
                        )}

                        {step === 5 && (
                            <div className="glass-container p-8 md:p-14">
                                <span className="section-header">Раздел 5 из 7</span>
                                <h2 className="text-3xl font-black mb-4 uppercase italic">Блок 3: Вердикт Агентов</h2>
                                <p className="text-xs text-slate-400 italic mb-10">«Здесь мы закрепляем параметры вашей новой реальности. Обратный путь в самообман будет закрыт».</p>
                                
                                <div className="space-y-8">
                                    <div className="input-wrapper">
                                        <label>Готов к «направленному взрыву»? *</label>
                                        <select name="Взрыв" onChange={handleUpdate}>
                                            <option value="">Выберите...</option>
                                            <option value="Да">Да, готов, даже если будет больно</option>
                                            <option value="Нет">Нет, ищу легкий путь</option>
                                        </select>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Кто принимает решения — ты или страх? *</label>
                                        <div className="rule-box">Где в теле ты чувствуешь этот страх, когда нужно принять жесткое решение?</div>
                                        <textarea name="Решение" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Срок обнуления бизнеса без тебя *</label>
                                        <input name="Смерть" onChange={handleUpdate} placeholder="Сколько дней продержится система?" />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Результат, за который готов отдать 500к+ *</label>
                                        <div className="rule-box">Опиши результат одной сессии, за который ты готов заплатить без колебаний.</div>
                                        <textarea name="Результат_500к" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <button className="btn-primary" onClick={() => validateStep(["Решение", "Результат_500к"], 10)}>Блок Ресурсов</button>
                                </div>
                            </div>
                        )}

                        {step === 6 && (
                            <div className="glass-container p-8 md:p-14">
                                <span className="section-header">Раздел 6 из 7</span>
                                <h2 className="text-3xl font-black mb-10 uppercase italic">Блок 4: Хранитель</h2>
                                
                                <div className="space-y-8">
                                    <div className="input-wrapper">
                                        <label>Реальный срок выхода на уровень *</label>
                                        <input name="Срок" onChange={handleUpdate} />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Кто внедряет изменения? *</label>
                                        <div className="rule-box">Есть ли команда или ты сам — «узкое горлышко» своей системы?</div>
                                        <input name="Внедрение" onChange={handleUpdate} />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Физика при «косяках» сотрудников *</label>
                                        <div className="rule-box">Гнев, сжатие челюсти, апатия? Опиши свою реакцию.</div>
                                        <textarea name="Реакция" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Сумма инвестиций в изменения прямо сейчас *</label>
                                        <input name="Бюджет" onChange={handleUpdate} />
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Часов в неделю на пересборку *</label>
                                        <input name="Время" onChange={handleUpdate} />
                                    </div>
                                    <button className="btn-primary" onClick={() => validateStep(["Реакция"], 5)}>К Финальному Фильтру</button>
                                </div>
                            </div>
                        )}

                        {step === 7 && (
                            <div className="glass-container p-8 md:p-14">
                                <span className="section-header">Раздел 7 из 7</span>
                                <h2 className="text-3xl font-black mb-10 uppercase italic">Блок 5: Частота Соответствия</h2>
                                
                                <div className="space-y-8">
                                    <div className="input-wrapper">
                                        <label>Почему именно мой Дар Архитектора? *</label>
                                        <textarea name="Почему_Я" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Твоя Точка Б через год *</label>
                                        <div className="rule-box">Сколько денег, сколько часов работы и где ты физически находишься?</div>
                                        <textarea name="Точка_Б" rows="2" onChange={handleUpdate}></textarea>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Удобный мессенджер для связи *</label>
                                        <select name="Мессенджер" onChange={handleUpdate}>
                                            <option value="">Выберите способы...</option>
                                            <option value="ТГ / Ватсап">ТГ + Ватсап</option>
                                            <option value="ТГ / Звонок">ТГ + Сотовая связь</option>
                                            <option value="МАКС">МАКС (Везде)</option>
                                        </select>
                                    </div>
                                    <div className="input-wrapper">
                                        <label>Ник ТГ (@ИМЯ) *</label>
                                        <input name="Ник_ТГ" onChange={handleUpdate} placeholder="@username" />
                                    </div>
                                    <button 
                                        className="btn-primary" 
                                        onClick={submitProtocol}
                                        disabled={loading}
                                    >
                                        {loading ? "ТРИАДА АНАЛИЗИРУЕТ..." : "СДАТЬ ПРОТОКОЛ"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 8 && (
                            <div className="glass-container p-14 text-center">
                                <div className="mb-8 flex justify-center">
                                    <div className="w-20 h-20 rounded-full border-2 border-accent flex items-center justify-center animate-pulse">
                                        <span className="text-accent text-3xl">✓</span>
                                    </div>
